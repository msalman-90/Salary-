<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salary Calculator | Mohamed Salman</title>
    
    <meta name="theme-color" content="#001e3c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg-color: #f0f2f5; --card-bg: #ffffff; --text-color: #212529; --header-bg: #001e3c; --weekend-bg: #f8f9fa; }
        [data-theme="dark"] { --bg-color: #0a1219; --card-bg: #1a2634; --text-color: #e0e0e0; --header-bg: #000b1a; --weekend-bg: #141d27; }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 100px; transition: 0.3s; }
        
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #001e3c 0%, #000b1a 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; transition: 0.8s; 
        }
        .splash-logo { width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); }

        .app-header { background: var(--header-bg); color: white; padding: 15px; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .day-card { background: var(--card-bg); border-radius: 15px; padding: 12px; margin-bottom: 10px; border-right: 5px solid #001e3c; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .weekend-card { background-color: var(--weekend-bg); border-right-color: #6c757d; }
        .absent-bg { border-right-color: #dc3545 !important; }
        
        .btn-results { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: #001e3c; color: white; border-radius: 50px; padding: 15px; font-weight: bold; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .ot-badge { background: #4cd137; color: #000; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="splash-logo">💊</div>
    <div class="h4 text-white m-0">Salary Calculator</div>
    <div class="text-white-50 small mt-2">By Mohamed Salman</div>
</div>

<div class="app-header shadow">
    <div class="d-flex gap-2">
        <button class="btn btn-sm text-white p-0" onclick="toggleTheme()">🌙</button>
        <button class="btn btn-sm text-white p-0" data-bs-toggle="modal" data-bs-target="#settingsModal">⚙️</button>
    </div>
    <h6 class="m-0 fw-bold">حاسبة الرواتب</h6>
    <button class="btn btn-sm text-white p-0" data-bs-toggle="modal" data-bs-target="#selectionModal">📅</button>
</div>

<div class="container mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span id="currentViewText" class="fw-bold text-muted small">...</span>
        <span id="totalHoursHeader" class="ot-badge" style="display:none;">0 س</span>
    </div>
    <div id="daysList"></div>
</div>

<button class="btn-results" data-bs-toggle="modal" data-bs-target="#resultModal" onclick="calculateFinal()">📊 عرض صافي الراتب</button>

<div class="modal fade" id="settingsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: var(--card-bg); color: var(--text-color); border-radius: 20px;">
            <div class="modal-header border-0"><h5>الإعدادات الأساسية</h5></div>
            <div class="modal-body">
                <div class="mb-3"><label class="small">الراتب الأساسي</label><input type="number" id="baseSalary" class="form-control" onchange="saveConfig()"></div>
                <div class="mb-3"><label class="small">سعر ساعة الإضافي</label><input type="number" id="hourRate" class="form-control" onchange="saveConfig()"></div>
                <div class="mb-3"><label class="small">السنة</label><select id="yearSelect" class="form-select" onchange="saveConfig(); loadSelectedData();"><option value="2026">2026</option><option value="2027">2027</option></select></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="selectionModal" data-bs-backdrop="static" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: var(--card-bg); color: var(--text-color); border-radius: 20px;">
            <div class="modal-body p-4 text-center">
                <h6 class="mb-3">اختر الشهر للمتابعة</h6>
                <select id="monthSelect" class="form-select form-select-lg mb-3 text-center">
                    <option value="1">يناير</option><option value="2">فبراير</option><option value="3" selected>مارس</option>
                    <option value="4">أبريل</option><option value="5">مايو</option><option value="6">يونيو</option>
                    <option value="7">يوليو</option><option value="8">أغسطس</option><option value="9">سبتمبر</option>
                    <option value="10">أكتوبر</option><option value="11">نوفمبر</option><option value="12">ديسمبر</option>
                </select>
                <button class="btn btn-primary w-100 rounded-pill py-2" data-bs-dismiss="modal" onclick="loadSelectedData()">فتح البيانات</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background: var(--card-bg); color: var(--text-color); border-radius: 25px;">
            <div class="modal-body p-4 text-center">
                <small class="text-muted">صافي الراتب المستحق</small>
                <h1 class="display-5 fw-bold text-primary my-3" id="resNet">0</h1>
                <div class="d-flex justify-content-between border-bottom py-2"><span>الأساسي</span> <b id="resBase">0</b></div>
                <div class="d-flex justify-content-between border-bottom py-2 text-success"><span>الإضافي (+)</span> <b id="resOt">0</b></div>
                <div class="d-flex justify-content-between py-2 text-danger"><span>الخصومات (-)</span> <b id="resDed">0</b></div>
                <button class="btn btn-dark w-100 mt-3 rounded-pill" data-bs-dismiss="modal">إغلاق</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const weekdays = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];

    // التخزين باستخدام LocalStorage لضمان العمل داخل APK
    function setData(id, data) {
        localStorage.setItem(id, JSON.stringify(data));
    }

    function getData(id) {
        const item = localStorage.getItem(id);
        return item ? JSON.parse(item) : null;
    }

    function initApp() {
        const config = getData('config') || { base: 8000, rate: 50, year: "2026" };
        document.getElementById('baseSalary').value = config.base;
        document.getElementById('hourRate').value = config.rate;
        document.getElementById('yearSelect').value = config.year;

        setTimeout(() => {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                new bootstrap.Modal(document.getElementById('selectionModal')).show();
            }, 800);
        }, 2000);
    }

    function loadSelectedData() {
        const y = document.getElementById('yearSelect').value;
        const m = document.getElementById('monthSelect').value;
        const mName = document.getElementById('monthSelect').options[document.getElementById('monthSelect').selectedIndex].text;
        document.getElementById('currentViewText').innerText = `${mName} ${y}`;
        renderDays(y, m);
    }

    function renderDays(y, m) {
        const list = document.getElementById('daysList'); list.innerHTML = '';
        const daysInMonth = new Date(y, m, 0).getDate();
        for (let i = 1; i <= daysInMonth; i++) {
            const dateObj = new Date(y, m - 1, i);
            const isWeekend = (dateObj.getDay() === 5 || dateObj.getDay() === 6);
            const d = getData(`d_${y}_${m}_${i}`) || { st: 'work', ot: 0, fa: 1.5, df: 1 };
            
            const card = document.createElement('div');
            card.className = `day-card ${d.st !== 'work' ? 'absent-bg' : ''} ${isWeekend ? 'weekend-card' : ''}`;
            card.innerHTML = `
                <div class="row align-items-center g-2">
                    <div class="col-3 text-center"><b>${i}</b><br><small class="opacity-50" style="font-size:0.7rem">${weekdays[dateObj.getDay()]}</small></div>
                    <div class="col-3">
                        <select class="form-select form-select-sm" id="st_${i}" onchange="updateDay(${i})">
                            <option value="work" ${d.st==='work'?'selected':''}>حضور</option>
                            <option value="absent" ${d.st==='absent'?'selected':''}>غياب</option>
                        </select>
                    </div>
                    <div class="col-6 d-flex gap-1" id="work_${i}" style="display:${d.st==='work'?'flex':'none'}">
                        <input type="number" class="form-control form-control-sm" id="ot_${i}" value="${d.ot}" oninput="updateDay(${i})">
                        <select class="form-select form-select-sm" id="fa_${i}" onchange="updateDay(${i})"><option value="1.5" ${d.fa==1.5?'selected':''}>1.5</option><option value="2" ${d.fa==2?'selected':''}>2</option></select>
                    </div>
                    <div class="col-6" id="absent_${i}" style="display:${d.st!=='work'?'block':'none'}">
                        <select class="form-select form-select-sm" id="df_${i}" onchange="updateDay(${i})"><option value="1" ${d.df==1?'selected':''}>خصم يوم</option><option value="2" ${d.df==2?'selected':''}>خصم يومين</option></select>
                    </div>
                </div>`;
            list.appendChild(card);
        }
        updateLiveCounter();
    }

    function updateDay(i) {
        const y = document.getElementById('yearSelect').value;
        const m = document.getElementById('monthSelect').value;
        const st = document.getElementById(`st_${i}`).value;
        const data = { 
            st, 
            ot: document.getElementById(`ot_${i}`).value, 
            fa: document.getElementById(`fa_${i}`).value, 
            df: document.getElementById(`df_${i}`).value 
        };
        
        document.getElementById(`work_${i}`).style.display = (st === 'work') ? 'flex' : 'none';
        document.getElementById(`absent_${i}`).style.display = (st !== 'work') ? 'block' : 'none';
        
        const card = document.getElementById(`st_${i}`).closest('.day-card');
        st !== 'work' ? card.classList.add('absent-bg') : card.classList.remove('absent-bg');
        
        setData(`d_${y}_${m}_${i}`, data);
        updateLiveCounter();
    }

    function updateLiveCounter() {
        let totalOT = 0;
        document.querySelectorAll('[id^="ot_"]').forEach(input => {
            const id = input.id.split('_')[1];
            if(document.getElementById(`st_${id}`).value === 'work') {
                totalOT += (parseFloat(input.value) || 0) * (parseFloat(document.getElementById(`fa_${id}`).value) || 1.5);
            }
        });
        document.getElementById('totalHoursHeader').innerText = totalOT.toFixed(1) + " س";
        document.getElementById('totalHoursHeader').style.display = 'inline-block';
    }

    function calculateFinal() {
        const base = parseFloat(document.getElementById('baseSalary').value) || 0;
        const rate = parseFloat(document.getElementById('hourRate').value) || 0;
        let otMoney = 0, dedMoney = 0;

        document.querySelectorAll('[id^="st_"]').forEach(sel => {
            const id = sel.id.split('_')[1];
            if(sel.value === 'work') {
                otMoney += (parseFloat(document.getElementById(`ot_${id}`).value) || 0) * (parseFloat(document.getElementById(`fa_${id}`).value) || 1.5) * rate;
            } else {
                dedMoney += (parseFloat(document.getElementById(`df_${id}`).value) || 0) * (base / 30);
            }
        });

        document.getElementById('resBase').innerText = base.toLocaleString() + " ج.م";
        document.getElementById('resOt').innerText = Math.round(otMoney).toLocaleString() + " ج.م";
        document.getElementById('resDed').innerText = Math.round(dedMoney).toLocaleString() + " ج.م";
        document.getElementById('resNet').innerText = Math.round(base + otMoney - dedMoney).toLocaleString() + " ج.م";
    }

    function toggleTheme() {
        const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
    }

    function saveConfig() {
        const config = { base: document.getElementById('baseSalary').value, rate: document.getElementById('hourRate').value, year: document.getElementById('yearSelect').value };
        setData('config', config);
    }

    // بدء التطبيق فوراً
    window.onload = initApp;
</script>
</body>
</html>
